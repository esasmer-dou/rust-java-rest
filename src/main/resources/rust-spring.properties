# Rust-Spring Performance Configuration
# Constraint #8: Properties bazlı config

# Server Configuration
server.port=8080
server.host=0.0.0.0

# Database Configuration (örnek)
db.url=jdbc:postgresql://localhost:5432/rust_spring
db.pool.size=10
db.timeout.ms=5000

# Native Library
native.library.path=native/rust_hyper.dll

# Native HTTP runtime limits
# Keep these bounded; increasing per-request limits without inflight caps can destroy RSS.
reactor.rust.http.max-request-body-bytes=1048576
reactor.rust.http.max-response-body-bytes=8388608
reactor.rust.http.max-inflight-body-bytes=33554432
reactor.rust.http.max-inflight-response-bytes=67108864
reactor.rust.http.max-connections=1024
reactor.rust.http.max-request-header-bytes=16384
reactor.rust.http.max-request-headers=64
reactor.rust.http.header-read-timeout-ms=5000
reactor.rust.http.request-body-timeout-ms=10000
reactor.rust.http.idle-timeout-ms=30000
reactor.rust.http.http1-only-enabled=false
reactor.rust.http.keep-alive-enabled=true
reactor.rust.log.level=error
reactor.rust.java.log.level=warn

# Native WebSocket runtime limits
# Bounded per-session outbound queue prevents unbounded RSS growth under slow consumers.
reactor.rust.websocket.max-frame-bytes=1048576
reactor.rust.websocket.outbound-queue-capacity=1024
reactor.rust.websocket.send-timeout-ms=5000

# 0 = auto, based on CPU with Rust-side cap.
reactor.rust.jni.workers=0
reactor.rust.jni.queue-capacity=1024

# Response body pool caps. Low-RSS default keeps retained native buffers bounded;
# throughput profile can override these upward during benchmark/deployment.
reactor.rust.response-pool.small-capacity=256
reactor.rust.response-pool.medium-capacity=384
reactor.rust.response-pool.large-capacity=16
reactor.rust.response-pool.huge-capacity=2

# Native dynamic response cache for repeated read-heavy payloads.
reactor.rust.native-cache.max-entries=1024
reactor.rust.native-cache.max-bytes=16777216
reactor.rust.native-cache.ttl-ms=300000

# Rust/Tokio runtime sizing. 0 = auto.
reactor.rust.runtime.worker-threads=0
reactor.rust.runtime.max-blocking-threads=0
reactor.rust.runtime.thread-stack-bytes=0

# DSL-JSON writer retention cap: prevents large one-off responses from pinning big byte[] per JNI worker.
reactor.rust.json.writer-initial-bytes=4096
reactor.rust.json.writer-retain-max-bytes=262144
